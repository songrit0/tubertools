<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player Display</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Visibility ── */
    .player-wrapper {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s ease;
    }
    .player-wrapper.idle { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════════
       FULL CARD PLAYER
    ══════════════════════════════════ */
    .player-card {
      width: 220px;
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .player-card.dark {
      background: #1a1a2e;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* Album art */
    .album-art {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 0.4s ease;
    }
    .album-art .art-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      line-height: 1.6;
      z-index: 1;
    }
    .album-art .app-name { font-size: 7px; opacity: 0.8; display: block; }

    /* Equalizer bars inside album art when playing */
    .eq-bars {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      align-items: flex-end;
      height: 20px;
      z-index: 2;
    }
    .eq-bar {
      width: 4px;
      background: rgba(255,255,255,0.7);
      border-radius: 2px;
      animation: none;
      height: 4px;
    }
    .playing .eq-bar:nth-child(1) { animation: eq1 0.7s ease-in-out infinite alternate; }
    .playing .eq-bar:nth-child(2) { animation: eq2 0.5s ease-in-out infinite alternate; }
    .playing .eq-bar:nth-child(3) { animation: eq3 0.9s ease-in-out infinite alternate; }
    .playing .eq-bar:nth-child(4) { animation: eq2 0.6s ease-in-out infinite alternate; }
    .playing .eq-bar:nth-child(5) { animation: eq1 0.8s ease-in-out infinite alternate; }

    @keyframes eq1 { from { height: 4px; } to { height: 18px; } }
    @keyframes eq2 { from { height: 6px; } to { height: 14px; } }
    @keyframes eq3 { from { height: 8px; } to { height: 20px; } }

    /* Song info row */
    .song-info {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .song-text { flex: 1; min-width: 0; }
    .song-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.3s ease;
    }
    .artist-name {
      font-size: 11px;
      opacity: 0.55;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .like-btn {
      background: none;
      border: none;
      font-size: 16px;
      flex-shrink: 0;
      padding: 2px;
      color: #e05;
    }

    /* Progress */
    .progress-area { display: flex; flex-direction: column; gap: 5px; }
    .progress-bar-track {
      width: 100%;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #fff;
      width: 0%;
      transition: width 0.8s linear;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      opacity: 0.45;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: inherit;
      opacity: 0.7;
      padding: 4px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn.play-pause { font-size: 20px; opacity: 1; }

    /* ══════════════════════════════════
       COMPACT BAR PLAYER
    ══════════════════════════════════ */
    .player-bar {
      width: 340px;
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player-bar.dark {
      background: #1a1a2e;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .player-bar.dark2 {
      background: #111827;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .player-bar.dark3 {
      background: #0f172a;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    .bar-thumb {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 0.4s ease;
    }
    .bar-thumb .eq-bars { bottom: 6px; height: 14px; }
    .bar-thumb .eq-bar { width: 3px; }
    .bar-thumb .art-label {
      font-size: 6px;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      line-height: 1.5;
      z-index: 1;
    }

    .bar-info { flex: 1; min-width: 0; }
    .bar-song {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-artist {
      font-size: 10px;
      opacity: 0.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .bar-progress {
      width: 100%;
      height: 2px;
      border-radius: 99px;
      background: rgba(255,255,255,0.12);
      margin-top: 5px;
    }
    .bar-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: rgba(255,255,255,0.7);
      width: 0%;
      transition: width 0.8s linear;
    }

    .bar-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .bar-btn {
      background: none;
      border: none;
      color: inherit;
      opacity: 0.65;
      padding: 3px;
      display: flex;
      align-items: center;
    }
    .bar-btn.play { opacity: 0.95; }

    /* ── Slide-in animation ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .player-wrapper.show { animation: slideIn 0.35s ease forwards; }

    /* ── Unlock overlay ── */
    #unlockScreen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      z-index: 999;
      color: #FFD700;
    }
    #unlockScreen .u-icon  { font-size: 48px; }
    #unlockScreen .u-label { font-size: 18px; font-weight: 700; }
    #unlockScreen .u-hint  { font-size: 12px; color: #888; }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyC95K5rmqsZbmPmSDvgGeWgqbQvOll4X60",
    authDomain: "tuber-tools-266cb.firebaseapp.com",
    databaseURL: "https://tuber-tools-266cb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tuber-tools-266cb",
    storageBucket: "tuber-tools-266cb.firebasestorage.app",
    messagingSenderId: "519614170930",
    appId: "1:519614170930:web:243813c3bcba9df196b92b",
  });
  const db = firebase.database();

  // ─── URL Params ──────────────────────────────────────────────────────────────
  // ?mode=card | bar1 | bar2 | bar3 | bars | all (default: all)
  // ?channel=<channelId>  (filter by channel, default: all)
  const params = new URLSearchParams(location.search);
  const MODE = params.get('mode') || 'all';
  const FILTER_CHANNEL = params.get('channel') || null;

  // Show/hide elements based on mode
  const cardEl       = document.getElementById('cardEl');
  const barsContainer = document.getElementById('barsContainer');
  const bar1El = document.getElementById('bar1El');
  const bar2El = document.getElementById('bar2El');
  const bar3El = document.getElementById('bar3El');

  function applyMode() {
    const showCard = MODE === 'all' || MODE === 'card';
    const showBars = MODE === 'all' || MODE === 'bars' || MODE === 'bar1' || MODE === 'bar2' || MODE === 'bar3';
    cardEl.style.display       = showCard ? '' : 'none';
    barsContainer.style.display = showBars ? '' : 'none';
    if (MODE === 'bar1') { bar2El.style.display = 'none'; bar3El.style.display = 'none'; }
    if (MODE === 'bar2') { bar1El.style.display = 'none'; bar3El.style.display = 'none'; }
    if (MODE === 'bar3') { bar1El.style.display = 'none'; bar2El.style.display = 'none'; }
  }
  applyMode();

  // ─── State ───────────────────────────────────────────────────────────────────
  let isPlaying = false;
  let startedAt = null;
  let progressTimer = null;
  let currentColor = '#5b8de8';

  const PAUSE_SVG_LG = `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`;
  const PLAY_SVG_LG  = `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const PAUSE_SVG_SM = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`;
  const PLAY_SVG_SM  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;

  function setPlayIcons(playing) {
    document.getElementById('cardPlayIcon').outerHTML  = (playing ? PAUSE_SVG_LG : PLAY_SVG_LG).replace('id="cardPlayIcon"','').replace('<svg','<svg id="cardPlayIcon"');
    ['1','2','3'].forEach(i => {
      const el = document.getElementById(`bar${i}PlayIcon`);
      if (el) {
        const html = (playing ? PAUSE_SVG_SM : PLAY_SVG_SM);
        el.outerHTML = html.replace('<svg', `<svg id="bar${i}PlayIcon"`);
      }
    });
  }

  function setEqPlaying(playing) {
    ['cardEq','barEq1','barEq2','barEq3'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('playing', playing);
    });
  }

  function setProgress(pct) {
    document.getElementById('cardProgress').style.width = pct + '%';
    ['1','2','3'].forEach(i => {
      const el = document.getElementById(`bar${i}Progress`);
      if (el) el.style.width = pct + '%';
    });
    // clock
    const elapsed = (pct / 100) * (progressTimer ? Infinity : 0);
    const s = Math.floor((Date.now() - startedAt) / 1000);
    const m = Math.floor(s / 60), sec = s % 60;
    document.getElementById('cardTimeCur').textContent = `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function startProgressTick() {
    clearInterval(progressTimer);
    progressTimer = setInterval(() => {
      if (!isPlaying || !startedAt) return;
      const elapsed = (Date.now() - startedAt) / 1000;
      const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
      document.getElementById('cardTimeCur').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      // rolling bar — advances forever (loop-safe)
      const pct = ((elapsed % 300) / 300) * 100;
      document.getElementById('cardProgress').style.width = pct + '%';
      ['1','2','3'].forEach(i => {
        const el = document.getElementById(`bar${i}Progress`);
        if (el) el.style.width = pct + '%';
      });
    }, 500);
  }

  function setColor(hex) {
    currentColor = hex || '#5b8de8';
    document.getElementById('artEl').style.background = currentColor;
    document.getElementById('barThumb1').style.background = currentColor;
    // bar2 and bar3 keep their own accent colors unless overridden
  }

  function setSongInfo(name, channel) {
    const song = name || 'Sound';
    const ch   = channel || '–';
    document.getElementById('cardSongName').textContent = song;
    document.getElementById('cardArtist').textContent   = ch;
    ['1','2','3'].forEach(i => {
      document.getElementById(`bar${i}Song`).textContent   = song;
      document.getElementById(`bar${i}Artist`).textContent = ch;
    });
  }

  function showPlayer() {
    const w = document.getElementById('playerWrapper');
    w.classList.remove('idle');
    w.classList.add('show');
  }

  function hidePlayer() {
    const w = document.getElementById('playerWrapper');
    w.classList.add('idle');
    w.classList.remove('show');
  }

  function onPlay(data) {
    isPlaying = true;
    startedAt = Date.now();
    setColor(data.buttonColor);
    setSongInfo(data.buttonName, data.channelName);
    setPlayIcons(true);
    setEqPlaying(true);
    showPlayer();
    startProgressTick();
    document.getElementById('cardTimeTot').textContent = data.loop ? '∞' : '–:––';
  }

  function onStop(data) {
    isPlaying = false;
    clearInterval(progressTimer);
    setPlayIcons(false);
    setEqPlaying(false);
    document.getElementById('cardProgress').style.width = '0%';
    ['1','2','3'].forEach(i => {
      const el = document.getElementById(`bar${i}Progress`);
      if (el) el.style.width = '0%';
    });
    document.getElementById('cardTimeCur').textContent = '0:00';
    setTimeout(hidePlayer, 600);
  }

  // ─── Audio Pool ──────────────────────────────────────────────────────────────
  const MAX_POOL = 8;
  const audioPool = [];

  function stopAllAudio() {
    audioPool.forEach(e => { e.audio.pause(); e.audio.currentTime = 0; });
    audioPool.length = 0;
  }

  function playAudio({ buttonId, soundUrl, volume, loop, stopOnNew }) {
    if (!soundUrl) return;
    if (stopOnNew) stopAllAudio();
    if (audioPool.length >= MAX_POOL) {
      const oldest = audioPool.shift();
      oldest.audio.pause();
    }
    const audio = new Audio(soundUrl);
    audio.volume = Math.min(1, Math.max(0, volume != null ? volume : 1));
    audio.loop = !!loop;
    const entry = { id: Date.now(), audio, buttonId };
    audioPool.push(entry);
    audio.play().catch(err => console.warn('Audio blocked:', err));
    audio.addEventListener('ended', () => {
      const idx = audioPool.findIndex(e => e.id === entry.id);
      if (idx !== -1) audioPool.splice(idx, 1);
      if (audioPool.length === 0) onStop({ triggeredAt: 'auto_' + Date.now() });
    });
  }

  // ─── Preview mode (no Firebase, no audio) ────────────────────────────────────
  const IS_PREVIEW = params.get('preview') === '1';
  if (IS_PREVIEW) {
    document.getElementById('unlockScreen').style.display = 'none';
    isPlaying = true;
    startedAt = Date.now();
    setColor(params.get('color') || '#FFD700');
    setSongInfo(params.get('song') || 'ชื่อเสียง / เพลง', params.get('ch') || 'ชื่อ Channel');
    setPlayIcons(true);
    setEqPlaying(true);
    showPlayer();
    startProgressTick();
  } else {
    // ─── Unlock screen → then start Firebase ────────────────────────────────────
    document.getElementById('unlockScreen').addEventListener('click', () => {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.resume().then(() => {
        document.getElementById('unlockScreen').style.display = 'none';
      });
    }, { once: true });

    // ─── Firebase Listeners ──────────────────────────────────────────────────────
    let lastStopAtFB = null;
    const queueStartKey = db.ref().push().key;
    db.ref('soundboard/queue').orderByKey().startAt(queueStartKey)
      .on('child_added', (snap) => {
        const data = snap.val();
        if (!data || data.action !== 'play') return;
        if (FILTER_CHANNEL && data.channelId !== FILTER_CHANNEL) return;
        playAudio(data);
        onPlay(data);
      });

    db.ref('soundboard/stopSignal').on('value', (snap) => {
      const data = snap.val();
      if (!data || data.triggeredAt === lastStopAtFB) return;
      lastStopAtFB = data.triggeredAt;
      stopAllAudio();
      onStop(data);
    });
  }
</script>

</body>
</html>
